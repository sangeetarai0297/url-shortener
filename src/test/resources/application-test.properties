# Test Configuration
spring.application.name=urlshortener
spring.profiles.active=test

# Use in-memory H2 database for testing (instead of PostgreSQL)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, for debugging)
spring.h2.console.enabled=false

# JPA Configuration for testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Redis Configuration - Uses embedded Redis in test config
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.redis.lettuce.shutdown-timeout=1000ms

# Disable logging during tests
logging.level.root=WARN
logging.level.com.example.urlshortener=INFO

# App configuration
app.short-url.base-url=http://localhost:8080
